# Deploy the dl.texpile.com download-counter Worker on changes to master.
# The API token needs Workers Scripts: Edit + Workers Routes: Edit (zone); without them the deploy
# step fails and dl.texpile.com keeps being served directly by the R2 custom domain.
name: dl-worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'tools/dl-worker/**'
      - '.github/workflows/dl-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # the Cloudflare secrets live in this environment; without naming it they never reach the job
    environment: CICD
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Worker
        working-directory: tools/dl-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
