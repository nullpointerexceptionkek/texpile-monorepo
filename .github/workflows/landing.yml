# Deploy the landing page to Cloudflare Pages on changes to master.
# Needs CLOUDFLARE_API_TOKEN (with "Cloudflare Pages: Edit") + CLOUDFLARE_ACCOUNT_ID secrets;
# the Pages project must already exist, with the custom domain attached in the dashboard.
name: landing

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'landing/**'
      - '.github/workflows/landing.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    # the Cloudflare secrets live in this environment; without naming it they never reach the job
    environment: CICD
    env:
      PROJECT: texpile-desktop # the Cloudflare Pages project name
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter texpile-desktop-landing build

      - name: Deploy to Cloudflare Pages
        working-directory: landing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --branch must match the project's production branch, or the deploy is filed as a preview
        run: npx wrangler@4 pages deploy build --project-name "$PROJECT" --branch master
